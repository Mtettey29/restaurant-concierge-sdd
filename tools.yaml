sources:
  restaurant-db:
    kind: cloud-sql-postgres
    project: ${GOOGLE_CLOUD_PROJECT}
    region: ${REGION}
    instance: restaurant-db
    database: restaurant_db
    user: postgres
    password: ${DB_PASSWORD}

tools:
  search_menu:
    kind: postgres-sql
    source: restaurant-db
    description: >
      Search menu items by keyword matching against name, category, or description.
      Use this for specific searches like "salmon" or "appetizers."
    statement: |
      SELECT name, category, description, price, dietary_tags
      FROM menu_items
      WHERE name ILIKE '%' || $1 || '%'
         OR category ILIKE '%' || $1 || '%'
         OR description ILIKE '%' || $1 || '%'
      LIMIT 10
    parameters:
      - name: query
        type: string
        description: Search term for menu items.

  semantic_search_menu:
    kind: postgres-sql
    source: restaurant-db
    description: >
      Search menu items using semantic similarity via vector embeddings.
      Use this for natural language queries like "something spicy" or
      "a light and refreshing dish." Preferred over keyword search for
      descriptive or vague requests.
    statement: |
      SELECT name, category, description, price, dietary_tags,
             1 - (embedding <=> embedding('gemini-embedding-001', $1)::vector) AS similarity
      FROM menu_items
      WHERE embedding IS NOT NULL
      ORDER BY embedding <=> embedding('gemini-embedding-001', $1)::vector
      LIMIT 5
    parameters:
      - name: query
        type: string
        description: Natural language description of the type of food the user is looking for.

  get_menu_by_category:
    kind: postgres-sql
    source: restaurant-db
    description: >
      Get all menu items in a specific category (appetizers, entrees, desserts, drinks).
    statement: |
      SELECT name, category, description, price, dietary_tags
      FROM menu_items
      WHERE category ILIKE $1
      ORDER BY name
    parameters:
      - name: category
        type: string
        description: The menu category (e.g., appetizers, entrees, desserts, drinks).

  create_reservation:
    kind: postgres-sql
    source: restaurant-db
    description: >
      Create a new restaurant table reservation.
      Requires guest_name, party_size, reservation_date (YYYY-MM-DD), and reservation_time (HH:MM).
      Optionally accepts special_requests.
    statement: |
      INSERT INTO reservations (guest_name, party_size, reservation_date, reservation_time, special_requests)
      VALUES ($1, $2, $3, $4, $5)
      RETURNING id, guest_name, party_size, reservation_date, reservation_time;
    parameters:
      - name: guest_name
        type: string
        description: Name of the guest making the reservation.
      - name: party_size
        type: integer
        description: Number of people in the party.
      - name: reservation_date
        type: string
        description: Date of the reservation (YYYY-MM-DD).
      - name: reservation_time
        type: string
        description: Time of the reservation (HH:MM).
      - name: special_requests
        type: string
        description: Any special requests (e.g., "window seat", "birthday").

  list_reservations:
    kind: postgres-sql
    source: restaurant-db
    description: >
      Retrieve all existing reservations for a specific guest name.
    statement: |
      SELECT id, guest_name, party_size, reservation_date, reservation_time, special_requests
      FROM reservations
      WHERE guest_name ILIKE $1
      ORDER BY reservation_date, reservation_time;
    parameters:
      - name: guest_name
        type: string
        description: Name of the guest to check reservations for.
